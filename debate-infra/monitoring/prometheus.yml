global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # debate-api (FastAPI) running on the host, e.g. `uvicorn app.main:app --port 8000`.
  # host.docker.internal resolves to the Mac from inside the container.
  # This target shows DOWN until the api is running — that's expected.
  - job_name: debate-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
